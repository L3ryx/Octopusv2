<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banana V2</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ================= BODY ================= */

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at center,#0f7a2d,#063d17);
font-family:'Montserrat',sans-serif;
}

/* ================= TITRE ================= */

.title{
font-family:'Bungee',cursive;
font-size:90px;
text-align:center;
color:white;
margin-top:30px;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{text-shadow:0 0 20px yellow;}
to{text-shadow:0 0 60px lime;}
}

/* Néon sous le titre */

.title::after{
content:"";
display:block;
width:60%;
height:8px;
margin:20px auto 0 auto;
background:linear-gradient(90deg,yellow,red,yellow);
filter:blur(15px);
animation:neonMove 3s infinite alternate;
}

@keyframes neonMove{
from{opacity:0.5;}
to{opacity:1;}
}

/* ================= CONTAINER ================= */

.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:25px;
width:100%;
}

/* Ligne menu + bouton random */

.menu-line{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
width:100%;
}

/* ================= SELECT ================= */

select{
width:450px;
padding:22px;
font-size:26px;
background:yellow;
border-radius:20px;
border:none;
font-weight:bold;
text-align:center;
transition:0.3s;
}

select.disabled{
opacity:0.5;
}

/* ================= RANDOM BUTTON ================= */

.random-btn{
width:70px;
height:70px;
font-size:30px;
border-radius:20px;
border:none;
cursor:pointer;
background:#444;
color:white;
transition:0.3s;
}

.random-btn.active{
background:limegreen;
transform:scale(1.1);
}

/* ================= GENERATE BUTTON ================= */

.generate-btn{
padding:25px 80px;
font-size:32px;
background:linear-gradient(45deg,red,orange);
color:white;
border:none;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.generate-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px yellow;
}

/* ================= TEXTAREA ================= */

textarea{
width:80%;
height:250px;
padding:25px;
border-radius:25px;
font-size:20px;
border:none;
}

/* ================= LOADING BAR ================= */

#loadingBar{
width:0%;
height:8px;
background:red;
border-radius:10px;
transition:width 0.5s ease;
}

/* ================= 3D BACKGROUND ================= */

#three-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

</style>
</head>
<body>

<div id="three-container"></div>

<h1 class="title">🍌 BANANA V2</h1>

<div class="container">

<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<select id="age"></select>

<!-- HAUT -->
<div class="menu-line">
<select id="haut"></select>
<button class="random-btn" onclick="toggleRandom('haut')">🎲</button>
</div>

<!-- BAS -->
<div class="menu-line">
<select id="bas"></select>
<button class="random-btn" onclick="toggleRandom('bas')">🎲</button>
</div>

<!-- FOND -->
<div class="menu-line">
<select id="fond"></select>
<button class="random-btn" onclick="toggleRandom('fond')">🎲</button>
</div>

<!-- ANGLE -->
<div class="menu-line">
<select id="angle"></select>
<button class="random-btn" onclick="toggleRandom('angle')">🎲</button>
</div>

<button class="generate-btn" onclick="generate()">🚀 GÉNÉRER</button>

<div id="loadingBar"></div>

<textarea id="output" placeholder="Ton prompt apparaît ici..."></textarea>

</div>

<script>

/* ================= LISTES ================= */

const hauts=["Veste dorée","Armure futuriste","Streetwear","Cape héroïque"];
const bas=["Jean","Cargo","Pantalon cyber","Tenue sportive"];
const fonds=["Ville néon","Jungle","Station spatiale","Plage sunset"];
const angles=["Vue face","Profil","Angle 3/4","Contre-plongée"];

function fill(id,list){
let select=document.getElementById(id);
list.forEach(item=>{
let opt=document.createElement("option");
opt.textContent=item;
select.appendChild(opt);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

let ageSelect=document.getElementById("age");
for(let i=16;i<=70;i++){
let opt=document.createElement("option");
opt.textContent=i;
ageSelect.appendChild(opt);
}

/* ================= RANDOM SYSTEM ================= */

let randomFields={
haut:false,
bas:false,
fond:false,
angle:false
};

function toggleRandom(field){

randomFields[field]=!randomFields[field];

let select=document.getElementById(field);
let btn=select.nextElementSibling;

if(randomFields[field]){
btn.classList.add("active");
select.classList.add("disabled");
}else{
btn.classList.remove("active");
select.classList.remove("disabled");
}

}

/* ================= GENERATE ================= */

async function generate(){

document.getElementById("loadingBar").style.width="0%";

setTimeout(()=>{
document.getElementById("loadingBar").style.width="100%";
},100);

let data={
genre:document.getElementById("genre").value,
age:document.getElementById("age").value,
haut:randomFields.haut?"RANDOM":document.getElementById("haut").value,
bas:randomFields.bas?"RANDOM":document.getElementById("bas").value,
fond:randomFields.fond?"RANDOM":document.getElementById("fond").value,
angle:randomFields.angle?"RANDOM":document.getElementById("angle").value
};

let res=await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let json=await res.json();

document.getElementById("output").value=json.prompt;
document.getElementById("loadingBar").style.width="0%";

}

/* ================= 3D BANANES ================= */

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=10;

const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("three-container").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1.5));
const light=new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,10,5);
scene.add(light);

/* 🍌 FORME BANANE */

const bananaShape=new THREE.CapsuleGeometry(0.6,3,16,32);

const bananaMaterial=new THREE.MeshStandardMaterial({
color:0xffd500,
roughness:0.3,
metalness:0.2
});

let bananas=[];

function spawnBanana(){

const banana=new THREE.Mesh(bananaShape,bananaMaterial);
banana.rotation.z=Math.PI/4;

banana.position.x=(Math.random()-0.5)*20;
banana.position.y=10+Math.random()*10;
banana.position.z=(Math.random()-0.5)*10;

banana.velocity={
x:(Math.random()-0.5)*0.2,
y:-0.05,
z:(Math.random()-0.5)*0.2
};

scene.add(banana);
bananas.push(banana);
}

setInterval(()=>{if(bananas.length<60)spawnBanana();},200);

function animate(){
requestAnimationFrame(animate);

bananas.forEach(b=>{
b.velocity.y-=0.002;
b.position.x+=b.velocity.x;
b.position.y+=b.velocity.y;
b.position.z+=b.velocity.z;

if(b.position.y<-8){
b.position.y=-8;
b.velocity.y*=-0.7;
}

b.rotation.x+=0.03;
b.rotation.y+=0.03;
});

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
